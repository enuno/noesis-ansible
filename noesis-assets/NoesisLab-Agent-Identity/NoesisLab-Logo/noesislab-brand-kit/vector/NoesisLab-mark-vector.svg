<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1248 1248" role="img" aria-labelledby="title desc">
  <title id="title">NoesisLab vector logo</title>
  <desc id="desc">A deep navy rounded-square app icon with a metallic gold NoesisLab emblem combining a Greek-key arc, gear arc, laboratory flask, eye, and neural circuit brain.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1100" y2="1180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#163966"/>
      <stop offset="0.42" stop-color="#082044"/>
      <stop offset="1" stop-color="#041326"/>
    </linearGradient>
    <linearGradient id="gold" x1="250" y1="160" x2="990" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7DAA4"/>
      <stop offset="0.28" stop-color="#D9A75D"/>
      <stop offset="0.62" stop-color="#B87739"/>
      <stop offset="1" stop-color="#FFE5B6"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="310" y1="290" x2="930" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A2622E"/>
      <stop offset="1" stop-color="#5A341C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020813" flood-opacity="0.68"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#F0C27A" flood-opacity="0.42"/>
    </filter>
    <style>
      .strokeGold { fill: none; stroke: url(#gold); stroke-width: 30; stroke-linecap: round; stroke-linejoin: round; filter: url(#shadow); }
      .strokeThin { fill: none; stroke: url(#gold); stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; }
      .fillGold { fill: url(#gold); filter: url(#shadow); }
      .darkLine { fill:none; stroke:#082044; stroke-width:14; stroke-linecap:round; stroke-linejoin:round; }
      .word { font-family: Avenir Next, Montserrat, Inter, Helvetica, Arial, sans-serif; font-size: 118px; font-weight: 500; letter-spacing: -3px; fill: url(#gold); filter: url(#shadow); }
    </style>
  </defs>

  <rect x="70" y="70" width="1108" height="1108" rx="155" fill="url(#bg)"/>
  <path d="M190 124 C280 82 925 74 1038 104 C1132 129 1180 226 1168 348" fill="none" stroke="#5D88C1" stroke-opacity="0.45" stroke-width="18" stroke-linecap="round"/>
  <rect x="70" y="70" width="1108" height="1108" rx="155" fill="none" stroke="#071429" stroke-opacity="0.75" stroke-width="7"/>

  <g transform="translate(0,-15)">
    <!-- Left Greek-key arc scaffold -->
    <path class="strokeGold" d="M392 205 A370 370 0 0 0 392 785"/>
    <path class="strokeThin" d="M430 255 A320 320 0 0 0 430 735" opacity="0.96"/>
    <g fill="none" stroke="url(#gold)" stroke-width="11" stroke-linecap="square" stroke-linejoin="miter" opacity="0.98">
      <path d="M412 242 h-55 v55 h34 v-28 h-17"/>
      <path d="M376 303 h-58 v58 h35 v-30 h-18"/>
      <path d="M350 374 h-61 v61 h37 v-31 h-19"/>
      <path d="M338 450 h-63 v63 h38 v-32 h-20"/>
      <path d="M350 528 h-61 v61 h37 v-31 h-19"/>
      <path d="M376 600 h-58 v58 h35 v-30 h-18"/>
      <path d="M414 662 h-55 v55 h34 v-28 h-17"/>
    </g>

    <!-- Right gear/claw arc -->
    <path class="strokeGold" d="M715 205 A370 370 0 0 1 715 785"/>
    <g class="fillGold">
      <path d="M716 181 h64 l-4 78 h-56z" transform="rotate(8 748 220)"/>
      <path d="M877 250 h62 l-35 70 h-54z" transform="rotate(25 894 286)"/>
      <path d="M970 390 h64 l-67 48 h-50z" transform="rotate(4 974 414)"/>
      <path d="M970 552 h64 l-67 48 h-50z" transform="rotate(-4 974 576)"/>
      <path d="M875 692 h62 l-35 70 h-54z" transform="rotate(-25 892 728)"/>
      <path d="M716 755 h64 l-4 78 h-56z" transform="rotate(-8 748 794)"/>
    </g>

    <!-- Flask/lab geometry rising from the eye -->
    <path class="strokeGold" d="M624 185 v165"/>
    <path class="strokeGold" d="M570 185 h108"/>
    <path class="strokeGold" d="M585 350 l-58 103"/>
    <path class="strokeGold" d="M663 350 l58 103"/>
    <circle cx="604" cy="350" r="14" class="fillGold"/>
    <circle cx="646" cy="383" r="14" class="fillGold"/>

    <!-- Eye body -->
    <path class="fillGold" d="M271 506 C368 390 483 338 624 338 C765 338 880 390 977 506 C880 622 765 674 624 674 C483 674 368 622 271 506 Z"/>
    <path d="M325 506 C404 424 500 385 624 385 C748 385 844 424 923 506 C844 588 748 627 624 627 C500 627 404 588 325 506 Z" fill="#082044"/>
    <path class="strokeThin" d="M325 506 C404 424 500 385 624 385 C748 385 844 424 923 506" opacity="0.96"/>
    <path class="strokeThin" d="M325 506 C404 588 500 627 624 627 C748 627 844 588 923 506" opacity="0.96"/>

    <!-- Neural/circuit brain inside the eye -->
    <g class="strokeThin" filter="url(#softGlow)">
      <path d="M468 506 c-34-8-50-48-18-71 c19-14 43-11 59 4 c10-40 66-47 88-13 c27-31 88-11 84 36 c39-2 61 38 39 68 c-17 24-45 30-72 16"/>
      <path d="M476 533 c34 32 92 29 124-2 c29 26 82 24 112-5"/>
      <path d="M551 444 v102"/>
      <path d="M611 423 v136"/>
      <path d="M675 459 v83"/>
      <path d="M511 497 h62"/>
      <path d="M611 503 h78"/>
      <path d="M552 546 l-66 48 v104"/>
      <path d="M611 560 v132"/>
      <path d="M675 542 l77 63"/>
    </g>
    <g class="fillGold">
      <circle cx="511" cy="497" r="10"/>
      <circle cx="611" cy="423" r="10"/>
      <circle cx="675" cy="459" r="10"/>
      <circle cx="486" cy="698" r="10"/>
      <circle cx="611" cy="692" r="10"/>
      <circle cx="752" cy="605" r="10"/>
    </g>

    <!-- Central stem/circuit spine -->
    <path class="strokeGold" d="M624 620 v185"/>
    <circle cx="624" cy="775" r="16" class="fillGold"/>
  </g>

  
</svg>
