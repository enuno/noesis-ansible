# Staging environment overrides for NoesisPraxis Helm charts
# Usage: helm install <release> charts/<chart> -f charts/values-staging.yaml

global:
  environment: staging
  imagePullPolicy: IfNotPresent

replicaCount: 2

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
  tls:
    - secretName: noesispraxis-tls-staging
      hosts:
        - "*.staging.noesis.local"
