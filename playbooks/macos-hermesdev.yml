---
# macos-hermesdev.yml — Standalone macOS HermesDev deployment
# Usage:
#   ansible-playbook -i inventory/tailscale/hosts.ini playbooks/macos-hermesdev.yml
#   ansible-playbook -i inventory/tailscale/hosts.ini playbooks/macos-hermesdev.yml --tags install,launchd

- name: Deploy Noesis HermesDev on macOS
  hosts: macos
  gather_facts: true
  tags: [macos, hermesdev]

  pre_tasks:
    - name: Validate macOS HermesDev configuration
      ansible.builtin.assert:
        that:
          - noesispraxis_enable_macos_agents | default(true) | bool
          - ansible_os_family == "Darwin"
        fail_msg: "macOS agents are disabled or target is not macOS. Check inventory and group_vars"

    - name: Ensure HermesDev data directory exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.noesispraxis/hermesdev"
        state: directory
        mode: '0755'

  roles:
    - role: macos_hermesdev
      tags: [macos, hermesdev]

  post_tasks:
    - name: Validate HermesDev launchd service
      ansible.builtin.command:
        cmd: "launchctl list com.noesis.hermesdev"
      register: hermesdev_launchd
      changed_when: false
      ignore_errors: true

    - name: Report HermesDev status
      ansible.builtin.debug:
        msg: "HermesDev launchd status: {{ hermesdev_launchd.rc | default('unknown') }}"
