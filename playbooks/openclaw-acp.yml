---
# openclaw-acp.yml — OpenClaw ACP gateway and agent registration
# Usage:
#   ansible-playbook -i inventory/local/hosts.ini playbooks/openclaw-acp.yml
#   ansible-playbook -i inventory/local/hosts.ini playbooks/openclaw-acp.yml --tags register

- name: Deploy OpenClaw ACP Gateway and Register Agent
  hosts: local
  gather_facts: false
  tags: [openclaw, acp, gateway]

  pre_tasks:
    - name: Validate OpenClaw ACP configuration
      ansible.builtin.assert:
        that:
          - noesispraxis_enable_openclaw_acp | default(false) | bool
        fail_msg: "OpenClaw ACP is disabled. Set noesispraxis_enable_openclaw_acp=true in group_vars"

    - name: Ensure OpenClaw base directory exists
      ansible.builtin.file:
        path: "{{ base_data_dir | default('/opt/noesispraxis') }}/openclaw"
        state: directory
        mode: '0755'

  roles:
    - role: openclaw_acp
      tags: [openclaw, acp]

  post_tasks:
    - name: Report OpenClaw ACP status
      ansible.builtin.debug:
        msg: "OpenClaw ACP gateway deployed for agent: {{ openclaw_agent_name }} | Gateway: {{ openclaw_gateway_url }}"
