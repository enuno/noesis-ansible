---
# a2a-registry.yml — Standalone A2A Registry deployment
# Usage:
#   ansible-playbook -i inventory/local/hosts.ini playbooks/a2a-registry.yml
#   ansible-playbook -i inventory/local/hosts.ini playbooks/a2a-registry.yml --tags install,configure

- name: Deploy A2A Registry
  hosts: local
  gather_facts: false
  tags: [foundation, a2a, registry]

  pre_tasks:
    - name: Validate A2A registry configuration
      ansible.builtin.assert:
        that:
          - a2a_registry_url is defined
          - noesispraxis_enable_a2a | default(true) | bool
        fail_msg: "A2A registry is disabled or misconfigured. Check group_vars/all.yml"

    - name: Ensure A2A registry data directory exists
      ansible.builtin.file:
        path: "{{ base_data_dir | default('/opt/noesispraxis') }}/a2a-registry"
        state: directory
        mode: '0755'

  roles:
    - role: a2a_registry
      tags: [a2a, registry]

  post_tasks:
    - name: Validate A2A registry health
      ansible.builtin.uri:
        url: "{{ a2a_registry_url }}/health"
        method: GET
        status_code: 200
      register: a2a_health
      retries: 5
      delay: 3
      until: a2a_health.status == 200
      ignore_errors: true

    - name: Report A2A registry status
      ansible.builtin.debug:
        msg: "A2A Registry deployed at {{ a2a_registry_url }} — health: {{ a2a_health.status | default('unknown') }}"
