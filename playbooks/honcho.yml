---
# honcho.yml — Standalone Honcho shared memory substrate deployment
# Usage:
#   ansible-playbook -i inventory/local/hosts.ini playbooks/honcho.yml
#   ansible-playbook -i inventory/local/hosts.ini playbooks/honcho.yml --tags install,configure

- name: Deploy Honcho Shared Memory Substrate
  hosts: local
  gather_facts: false
  tags: [memory, honcho]

  pre_tasks:
    - name: Validate Honcho configuration
      ansible.builtin.assert:
        that:
          - noesispraxis_enable_honcho | default(false) | bool
        fail_msg: "Honcho is disabled. Set noesispraxis_enable_honcho=true in group_vars"

    - name: Ensure Honcho data directory exists
      ansible.builtin.file:
        path: "{{ base_data_dir | default('/opt/noesispraxis') }}/honcho"
        state: directory
        mode: '0755'

  roles:
    - role: honcho
      tags: [honcho]

  post_tasks:
    - name: Validate Honcho health
      ansible.builtin.uri:
        url: "http://localhost:8095/health"
        method: GET
        status_code: 200
      register: honcho_health
      retries: 10
      delay: 5
      until: honcho_health.status == 200
      ignore_errors: true

    - name: Report Honcho status
      ansible.builtin.debug:
        msg: "Honcho deployed at http://localhost:8095 — health: {{ honcho_health.status | default('unknown') }}"
