---
# hermes.yml — Standalone Hermes supervisor runtime deployment
# Usage:
#   ansible-playbook -i inventory/local/hosts.ini playbooks/hermes.yml
#   ansible-playbook -i inventory/local/hosts.ini playbooks/hermes.yml --tags install,configure

- name: Deploy Hermes Supervisor Runtime
  hosts: local
  gather_facts: false
  tags: [runtime, hermes]

  pre_tasks:
    - name: Validate Hermes configuration
      ansible.builtin.assert:
        that:
          - noesispraxis_enable_generic_agents | default(true) | bool
        fail_msg: "Generic agents are disabled. Check group_vars/all.yml"

    - name: Ensure Hermes data directory exists
      ansible.builtin.file:
        path: "{{ base_data_dir | default('/opt/noesispraxis') }}/hermes"
        state: directory
        mode: '0755'

  roles:
    - role: hermes
      tags: [hermes]

  post_tasks:
    - name: Validate Hermes health
      ansible.builtin.uri:
        url: "http://localhost:8091/health"
        method: GET
        status_code: 200
      register: hermes_health
      retries: 5
      delay: 3
      until: hermes_health.status == 200
      ignore_errors: true

    - name: Report Hermes status
      ansible.builtin.debug:
        msg: "Hermes deployed — health: {{ hermes_health.status | default('unknown') }}"
