---
# ans.yml — Standalone Agent Name Service deployment
# Usage:
#   ansible-playbook -i inventory/local/hosts.ini playbooks/ans.yml
#   ansible-playbook -i inventory/local/hosts.ini playbooks/ans.yml --tags install,configure

- name: Deploy Agent Name Service
  hosts: local
  gather_facts: false
  tags: [foundation, ans, registry]

  pre_tasks:
    - name: Validate ANS configuration
      ansible.builtin.assert:
        that:
          - ans_url is defined
          - noesispraxis_enable_ans | default(true) | bool
        fail_msg: "ANS is disabled or misconfigured. Check group_vars/all.yml"

    - name: Ensure ANS data directory exists
      ansible.builtin.file:
        path: "{{ base_data_dir | default('/opt/noesispraxis') }}/ans"
        state: directory
        mode: '0755'

  roles:
    - role: ans
      tags: [ans, registry]

  post_tasks:
    - name: Validate ANS health
      ansible.builtin.uri:
        url: "{{ ans_url }}/health"
        method: GET
        status_code: 200
      register: ans_health
      retries: 5
      delay: 3
      until: ans_health.status == 200
      ignore_errors: true

    - name: Report ANS status
      ansible.builtin.debug:
        msg: "ANS deployed at {{ ans_url }} — health: {{ ans_health.status | default('unknown') }}"
