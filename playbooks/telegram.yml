---
# telegram.yml — Standalone Telegram bot integration deployment
# Usage:
#   ansible-playbook -i inventory/local/hosts.ini playbooks/telegram.yml
#   ansible-playbook -i inventory/local/hosts.ini playbooks/telegram.yml --tags install,webhook

- name: Deploy Telegram Bot Integration
  hosts: local
  gather_facts: false
  tags: [communications, telegram]

  pre_tasks:
    - name: Validate Telegram configuration
      ansible.builtin.assert:
        that:
          - noesispraxis_enable_telegram | default(true) | bool
        fail_msg: "Telegram is disabled. Check group_vars/all.yml"

    - name: Ensure Telegram data directory exists
      ansible.builtin.file:
        path: "{{ base_data_dir | default('/opt/noesispraxis') }}/telegram"
        state: directory
        mode: '0755'

  roles:
    - role: telegram
      tags: [telegram]

  post_tasks:
    - name: Report Telegram status
      ansible.builtin.debug:
        msg: "Telegram bot deployment complete for group: {{ telegram_group | default('NoesisWorld') }}"
