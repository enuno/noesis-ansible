---
- name: Ensure Harbor data directory exists
  ansible.builtin.file:
    path: "{{ harbor_data_dir }}"
    state: directory
    mode: '0755'

- name: Check if Harbor is already installed
  ansible.builtin.stat:
    path: "{{ harbor_data_dir }}/docker-compose.yml"
  register: harbor_compose

- name: Download Harbor offline installer
  ansible.builtin.get_url:
    url: "{{ harbor_installer_url }}"
    dest: "/tmp/harbor-offline-installer-v{{ harbor_version }}.tgz"
    mode: '0644'
  when: not harbor_compose.stat.exists

- name: Extract Harbor installer
  ansible.builtin.unarchive:
    src: "/tmp/harbor-offline-installer-v{{ harbor_version }}.tgz"
    dest: "/tmp"
    remote_src: true
  when: not harbor_compose.stat.exists

- name: Render Harbor configuration
  ansible.builtin.template:
    src: harbor.yml.j2
    dest: "{{ harbor_data_dir }}/harbor.yml"
    mode: '0644'
  notify: restart harbor

- name: Run Harbor installer
  ansible.builtin.command:
    cmd: "./install.sh --with-trivy"
    chdir: "/tmp/harbor"
  when: not harbor_compose.stat.exists
  ignore_errors: true
