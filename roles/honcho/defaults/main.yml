---
# Honcho shared secondary memory substrate defaults
# https://github.com/plastic-labs/honcho

honcho_enabled: "{{ noesispraxis_enable_honcho | default(false) | bool }}"
honcho_version: "v3"
honcho_port: 8095
honcho_base_url: "http://localhost:{{ honcho_port }}"

# Self-hosted deployment
honcho_repo: "https://github.com/plastic-labs/honcho.git"
honcho_install_dir: "{{ base_data_dir | default('/opt/noesispraxis') }}/honcho"
honcho_data_dir: "{{ base_data_dir | default('/opt/noesispraxis') }}/honcho/data"

# Database
honcho_db_password: "{{ vault_honcho_db_password | default('honcho123') }}"
honcho_db_volume: "{{ honcho_data_dir }}/postgres"

# Reasoning and capabilities
honcho_reasoning_enabled: true
honcho_peer_cards_enabled: true
honcho_dreaming_enabled: true
honcho_streaming_enabled: true
honcho_file_uploads_enabled: true

# Security
honcho_auth_enabled: true
honcho_api_key: "{{ vault_honcho_api_key | default('honcho-api-key') }}"

# Docker
honcho_image: "ghcr.io/plastic-labs/honcho:{{ honcho_version }}"
honcho_container_name: noesis-honcho

# Resource limits
honcho_cpu_limit: "0.5"
honcho_memory_limit: "512m"

# Logging
honcho_log_level: info
