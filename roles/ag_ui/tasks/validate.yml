---
- name: Check AG-UI health endpoint
  ansible.builtin.uri:
    url: "{{ ag_ui_base_url }}{{ ag_ui_health_endpoint }}"
    method: GET
    status_code: 200
  register: ag_ui_health
  retries: 5
  delay: 3
  until: ag_ui_health.status == 200
  ignore_errors: true

- name: Report AG-UI validation
  ansible.builtin.debug:
    msg: "AG-UI health: {{ ag_ui_health.status | default('unreachable') }}"
