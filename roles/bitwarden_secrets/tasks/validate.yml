---
- name: Check if secrets metadata exists
  ansible.builtin.stat:
    path: "{{ local_secrets_dir }}/.secrets-meta.yml"
  register: secrets_meta_stat
  tags: [secrets, validate]

- name: Load secrets metadata
  ansible.builtin.include_vars:
    file: "{{ local_secrets_dir }}/.secrets-meta.yml"
    name: secrets_meta
  when: secrets_meta_stat.stat.exists
  tags: [secrets, validate]

- name: Validate secrets are not empty
  ansible.builtin.fail:
    msg: "Secret {{ item.key }} is empty or undefined"
  loop: "{{ bitwarden_secrets_map | dict2items }}"
  when:
    - validate_secrets | bool
    - item.value.vault_key is defined
  tags: [secrets, validate]

- name: Validate secrets age
  ansible.builtin.fail:
    msg: "Secrets are older than {{ secret_max_age_days }} days. Run with --tags secrets to refresh."
  when:
    - secrets_meta_stat.stat.exists
    - (ansible_date_time.epoch | int - (secrets_meta.secrets_fetched_at | default(ansible_date_time.iso8601) | to_datetime('%Y-%m-%dT%H:%M:%SZ').strftime('%s')) | int) > (secret_max_age_days | int * 86400)
  tags: [secrets, validate]
