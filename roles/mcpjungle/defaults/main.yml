---
# MCPJungle defaults
mcpjungle_version: "latest"
mcpjungle_port: 8085
mcpjungle_data_dir: "{{ base_data_dir }}/mcpjungle"
mcpjungle_log_dir: "{{ base_log_dir }}/mcpjungle"
mcpjungle_image: "noesispraxis/mcpjungle:{{ mcpjungle_version }}"
mcpjungle_name: "mcpjungle"

# List of MCP servers to onboard
# Each server is a dict matching the MCP server schema
mcp_servers: []
