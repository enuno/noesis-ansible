---
- name: Deregister Hermes agent from ACP registry
  ansible.builtin.uri:
    url: "{{ acp_registry_url }}/agents/{{ hermes_agent_name }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ hermes_registry_api_key }}"
    status_code: [200, 204, 404]
  ignore_errors: true

- name: Deregister Hermes agent from A2A registry
  ansible.builtin.uri:
    url: "{{ a2a_registry_url }}/agents/{{ hermes_agent_name }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ hermes_registry_api_key }}"
    status_code: [200, 204, 404]
  ignore_errors: true

- name: Deregister Hermes agent from Agent Registry
  ansible.builtin.uri:
    url: "{{ agent_registry_url }}/agents/{{ hermes_agent_name }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ hermes_registry_api_key }}"
    status_code: [200, 204, 404]
  ignore_errors: true

- name: Stop and disable Hermes ACP service
  ansible.builtin.systemd:
    name: "{{ hermes_service_name }}"
    state: stopped
    enabled: false
  ignore_errors: true
