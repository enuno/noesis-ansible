---
- name: Render Hermes environment file
  ansible.builtin.template:
    src: hermes.env.j2
    dest: "{{ hermes_env_file }}"
    mode: '0600'
  notify: reload hermes acp

- name: Render Hermes ACP adapter configuration
  ansible.builtin.template:
    src: hermes-acp-config.yml.j2
    dest: "{{ hermes_config_dir }}/acp-config.yml"
    mode: '0644'
  notify: reload hermes acp

- name: Render agent identity metadata
  ansible.builtin.template:
    src: hermes-agent-metadata.json.j2
    dest: "{{ hermes_config_dir }}/agent-metadata.json"
    mode: '0644'
