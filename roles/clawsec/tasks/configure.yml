---
- name: Render ClawSec policy configuration
  ansible.builtin.template:
    src: clawsec-policy.yml.j2
    dest: "{{ base_data_dir | default('/opt/noesispraxis') }}/clawsec-policy.yml"
    mode: '0644'

- name: Render ClawSec scan targets
  ansible.builtin.template:
    src: clawsec-targets.yml.j2
    dest: "{{ base_data_dir | default('/opt/noesispraxis') }}/clawsec-targets.yml"
    mode: '0644'
