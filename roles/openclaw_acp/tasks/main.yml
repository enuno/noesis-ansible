---
- name: Include AlphaClaw ACP install
  ansible.builtin.include_tasks: install.yml
  when: openclaw_acp_enabled | bool
  tags: [openclaw, acp, install]

- name: Include AlphaClaw ACP configure
  ansible.builtin.include_tasks: configure.yml
  when: openclaw_acp_enabled | bool
  tags: [openclaw, acp, configure]

- name: Include AlphaClaw ACP registry registration
  ansible.builtin.include_tasks: register.yml
  when: openclaw_acp_enabled | bool
  tags: [openclaw, acp, register]

- name: Include AlphaClaw ACP validate
  ansible.builtin.include_tasks: validate.yml
  when: openclaw_acp_enabled | bool
  tags: [openclaw, acp, validate]
