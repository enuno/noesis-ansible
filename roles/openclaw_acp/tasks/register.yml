---
- name: Wait for OpenClaw gateway health
  ansible.builtin.uri:
    url: "{{ openclaw_gateway_url }}{{ openclaw_gateway_health_path }}"
    method: GET
    status_code: 200
  register: gateway_health
  retries: "{{ openclaw_health_retries }}"
  delay: "{{ openclaw_health_delay }}"
  until: gateway_health.status == 200
  ignore_errors: true

- name: Register agent with ACP registry
  ansible.builtin.uri:
    url: "{{ acp_registry_url }}/agents"
    method: POST
    headers:
      Content-Type: application/json
      Authorization: "Bearer {{ openclaw_registry_api_key }}"
    body:
      name: "{{ openclaw_agent_name }}"
      role: "{{ openclaw_agent_role }}"
      endpoint: "{{ openclaw_gateway_url }}"
      protocols: "{{ openclaw_agent_protocols }}"
      owner: "{{ openclaw_agent_owner }}"
    body_format: json
    status_code: [200, 201, 409]
  register: acp_registration
  ignore_errors: true

- name: Register agent with A2A registry
  ansible.builtin.uri:
    url: "{{ a2a_registry_url }}/agents"
    method: POST
    headers:
      Content-Type: application/json
      Authorization: "Bearer {{ openclaw_registry_api_key }}"
    body:
      name: "{{ openclaw_agent_name }}"
      endpoint: "{{ openclaw_gateway_url }}"
      capabilities: "{{ openclaw_agent_capabilities }}"
      protocols: "{{ openclaw_agent_protocols }}"
    body_format: json
    status_code: [200, 201, 409]
  register: a2a_registration
  ignore_errors: true

- name: Register agent with Agent Registry
  ansible.builtin.uri:
    url: "{{ agent_registry_url }}/agents"
    method: POST
    headers:
      Content-Type: application/json
      Authorization: "Bearer {{ openclaw_registry_api_key }}"
    body:
      name: "{{ openclaw_agent_name }}"
      role: "{{ openclaw_agent_role }}"
      capabilities: "{{ openclaw_agent_capabilities }}"
      endpoint: "{{ openclaw_gateway_url }}"
      owner: "{{ openclaw_agent_owner }}"
      protocols: "{{ openclaw_agent_protocols }}"
    body_format: json
    status_code: [200, 201, 409]
  register: agent_registry_registration
  ignore_errors: true

- name: Report registration status
  ansible.builtin.debug:
    msg: "ACP: {{ acp_registration.status | default('failed') }} | A2A: {{ a2a_registration.status | default('failed') }} | AgentReg: {{ agent_registry_registration.status | default('failed') }}"
