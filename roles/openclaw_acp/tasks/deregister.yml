---
- name: Deregister agent from ACP registry
  ansible.builtin.uri:
    url: "{{ acp_registry_url }}/agents/{{ openclaw_agent_name }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ openclaw_registry_api_key }}"
    status_code: [200, 204, 404]
  ignore_errors: true

- name: Deregister agent from A2A registry
  ansible.builtin.uri:
    url: "{{ a2a_registry_url }}/agents/{{ openclaw_agent_name }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ openclaw_registry_api_key }}"
    status_code: [200, 204, 404]
  ignore_errors: true

- name: Deregister agent from Agent Registry
  ansible.builtin.uri:
    url: "{{ agent_registry_url }}/agents/{{ openclaw_agent_name }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ openclaw_registry_api_key }}"
    status_code: [200, 204, 404]
  ignore_errors: true

- name: Stop and disable AlphaClaw ACP service
  ansible.builtin.systemd:
    name: "{{ openclaw_service_name }}"
    state: stopped
    enabled: false
  ignore_errors: true
