---
- name: Ensure AlphaClaw directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ openclaw_install_dir }}"
    - "{{ openclaw_config_dir }}"

- name: Install AlphaClaw CLI
  ansible.builtin.command:
    cmd: "npm install --prefix {{ openclaw_install_dir }} {{ alphaclaw_package }}"
    creates: "{{ openclaw_install_dir }}/node_modules/.bin/alphaclaw"

- name: Symlink AlphaClaw to system PATH
  ansible.builtin.file:
    src: "{{ openclaw_install_dir }}/node_modules/.bin/alphaclaw"
    dest: /usr/local/bin/alphaclaw
    state: link
    force: true

- name: Render AlphaClaw ACP systemd service
  ansible.builtin.template:
    src: openclaw-acp.service.j2
    dest: "{{ openclaw_systemd_unit }}"
    mode: '0644'
  notify: restart openclaw acp

- name: Enable AlphaClaw ACP service
  ansible.builtin.systemd:
    name: "{{ openclaw_service_name }}"
    enabled: true
    daemon_reload: true
