---
- name: Ensure OpenClaw directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ openclaw_install_dir }}"
    - "{{ openclaw_config_dir }}"

- name: Install OpenClaw CLI
  ansible.builtin.get_url:
    url: "https://github.com/openclaw/openclaw/releases/download/{{ openclaw_version }}/openclaw-linux-amd64"
    dest: "{{ openclaw_install_dir }}/openclaw"
    mode: '0755'
  ignore_errors: true

- name: Symlink OpenClaw to system PATH
  ansible.builtin.file:
    src: "{{ openclaw_install_dir }}/openclaw"
    dest: /usr/local/bin/openclaw
    state: link
    force: true
  ignore_errors: true

- name: Render OpenClaw ACP systemd service
  ansible.builtin.template:
    src: openclaw-acp.service.j2
    dest: "{{ openclaw_systemd_unit }}"
    mode: '0644'
  notify: restart openclaw acp

- name: Enable OpenClaw ACP service
  ansible.builtin.systemd:
    name: "{{ openclaw_service_name }}"
    enabled: true
    daemon_reload: true
  ignore_errors: true
