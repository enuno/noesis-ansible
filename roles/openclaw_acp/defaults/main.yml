---
# AlphaClaw ACP gateway and agent registration defaults

openclaw_acp_enabled: "{{ noesispraxis_enable_openclaw_acp | default(false) | bool }}"
alphaclaw_package: "@garrytan/alphaclaw@latest"

# Gateway configuration
openclaw_gateway_host: "localhost"
openclaw_gateway_port: 8080
openclaw_gateway_url: "http://{{ openclaw_gateway_host }}:{{ openclaw_gateway_port }}"
openclaw_gateway_health_path: "/health"

# ACP bridge
openclaw_acp_bridge_enabled: true
openclaw_acp_bridge_mode: "stdio"
openclaw_acp_bridge_command: "alphaclaw start"
openclaw_acp_bridge_socket: "/tmp/alphaclaw-acp.sock"

# Agent identity
openclaw_agent_name: "alphaclaw-default"
openclaw_agent_role: "generic"
openclaw_agent_capabilities: []
openclaw_agent_owner: "noesispraxis"
openclaw_agent_protocols:
  - acp
  - a2a

# Registry endpoints
acp_registry_url: "http://localhost:8081"
a2a_registry_url: "http://localhost:8084"
agent_registry_url: "http://localhost:8083"

# Authentication
openclaw_acp_auth_token: "{{ vault_openclaw_acp_token | default('') }}"
openclaw_registry_api_key: "{{ vault_openclaw_registry_key | default('') }}"

# Service
openclaw_service_name: "alphaclaw-acp"
openclaw_systemd_unit: "/etc/systemd/system/{{ openclaw_service_name }}.service"

# Paths
openclaw_install_dir: "{{ base_data_dir | default('/opt/noesispraxis') }}/alphaclaw"
openclaw_config_dir: "{{ openclaw_install_dir }}/config"

# Resource limits
openclaw_cpu_limit: "0.5"
openclaw_memory_limit: "512m"

# Validation
openclaw_health_retries: 10
openclaw_health_delay: 5
