---
# Wait for systemd to complete initialization on Fedora — integrated from artis3n/ansible-role-tailscale

- name: Fedora | Wait for systemd to complete initialization
  ansible.builtin.command: systemctl is-system-running
  register: systemctl_status
  until: >
    'running' in systemctl_status.stdout or
    'degraded' in systemctl_status.stdout
  retries: 30
  delay: 5
  when: ansible_service_mgr == 'systemd'
  changed_when: false
  failed_when:
    - systemctl_status.rc != 0
    - not (systemctl_status.rc == 1 and 'degraded' in systemctl_status.stdout)
