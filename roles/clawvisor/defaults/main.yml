---
# Clawvisor defaults
clawvisor_version: "latest"
clawvisor_port: 8086
clawvisor_data_dir: "{{ base_data_dir }}/clawvisor"
clawvisor_log_dir: "{{ base_log_dir }}/clawvisor"

# Security policies
# Each policy is a dict matching the Clawvisor policy schema
clawvisor_policies: []
